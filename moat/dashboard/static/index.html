<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moat Dashboard — 传感器监控</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
</head>
<body>

<!-- Toast -->
<div id="toast-container" class="toast-container"></div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="header-left">
      <div class="logo">🛡️ Moat <span>Dashboard</span></div>
      <div id="status-badge" class="status-badge green">
        <span class="status-dot green"></span> 加载中...
      </div>
    </div>
    <div class="header-right">
      <span class="last-updated" id="last-updated"></span>
      <button class="btn btn-danger" onclick="resetEvents()" title="清空所有传感器事件">🗑️ 清空</button>
      <button class="btn" id="btn-baseline" onclick="saveBaseline()">💾 基线</button>
      <button class="btn btn-primary" id="btn-check" onclick="runCheck()">🔍 检查</button>
    </div>
  </div>
</header>

<!-- Main -->
<main class="main">

  <!-- Stats -->
  <section class="stats">
    <div class="stat-card"><div class="icon-bg"></div><div class="label">监控组件</div><div class="value white">-</div><div class="sub">个组件</div></div>
    <div class="stat-card"><div class="icon-bg"></div><div class="label">运行正常</div><div class="value green">-</div><div class="sub">运行正常</div></div>
    <div class="stat-card"><div class="icon-bg"></div><div class="label">降级运行</div><div class="value yellow">-</div><div class="sub">降级运行</div></div>
    <div class="stat-card"><div class="icon-bg"></div><div class="label">近期告警</div><div class="value red">-</div><div class="sub">近期告警</div></div>
    <div class="stat-card"><div class="icon-bg"></div><div class="label">总事件数</div><div class="value blue">-</div><div class="sub">总事件数</div></div>
  </section>

  <!-- Panels -->
  <section class="panels">

    <!-- Left: Event Stream -->
    <div class="panel">
      <div class="panel-header">
        <h2>📡 实时事件流</h2>
        <span id="event-badge" class="badge">0</span>
      </div>
      <div class="event-filter">
        <input type="text" placeholder="🔍 搜索组件名或错误..." oninput="onSearch(this.value)" spellcheck="false">
        <div class="filter-btn-group">
          <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
          <button class="filter-btn" data-filter="ok" onclick="setFilter('ok')">🟢 正常</button>
          <button class="filter-btn" data-filter="degraded" onclick="setFilter('degraded')">🟡 降级</button>
          <button class="filter-btn" data-filter="panic" onclick="setFilter('panic')">🔴 异常</button>
        </div>
      </div>
      <div id="event-list" class="panel-body event-list"></div>
    </div>

    <!-- Right: Health Grid -->
    <div class="panel">
      <div class="panel-header">
        <h2>🔥 组件健康</h2>
        <span id="health-badge" class="badge">0</span>
      </div>
      <div id="health-grid" class="panel-body health-grid"></div>
    </div>

  </section>

  <!-- Footer -->
  <div class="footer">
    <span class="hint-label">💡 项目</span>
    <code id="project-name">-</code>
    <span class="hint-label">|</span>
    <code>moat sensor events</code>
    <code>moat sensor stats</code>
    <span class="right">
      <a href="#" onclick="showHelp();return false" style="color:var(--blue);text-decoration:none;">📖 帮助</a>
    </span>
  </div>

</main>

<script src="/static/app.js"></script>
</body>
</html>
